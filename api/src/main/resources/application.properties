spring.application.name=tutor-time-tracker-api
server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:development}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

report.export.latex.local.command=${LATEX_COMMAND:pdflatex}
report.export.latex.timeout-seconds=${LATEX_TIMEOUT_SECONDS:30}
