spring.application.name=tutor-time-tracker-api
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3307/tutortimetracker}
spring.datasource.username=${DB_USERNAME:tutortime}
spring.datasource.password=${DB_PASSWORD:tutortime}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

report.export.latex.runner=${LATEX_RUNNER:compose}
report.export.latex.local.command=${LATEX_COMMAND:pdflatex}
report.export.latex.docker.executable=${LATEX_DOCKER_EXECUTABLE:docker}
report.export.latex.docker.image=${LATEX_DOCKER_IMAGE:tutor-tracker-latex:latest}
report.export.latex.docker.command=${LATEX_DOCKER_COMMAND:pdflatex}
report.export.latex.compose.service=${LATEX_COMPOSE_SERVICE:latex}
report.export.latex.compose.host-work-root=${LATEX_COMPOSE_HOST_WORK_ROOT:.latex-work}
report.export.latex.compose.container-work-root=${LATEX_COMPOSE_CONTAINER_WORK_ROOT:/latex-work}
report.export.latex.compose.project-directory=${LATEX_COMPOSE_PROJECT_DIRECTORY:.}
report.export.latex.timeout-seconds=${LATEX_TIMEOUT_SECONDS:30}
