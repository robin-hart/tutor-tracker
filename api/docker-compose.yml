services:
  mariadb:
    image: mariadb:11.4
    container_name: tutortimetracker-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: tutortimetracker
      MARIADB_USER: tutortime
      MARIADB_PASSWORD: tutortime
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  latex:
    build:
      context: .
      dockerfile: docker/latex/Dockerfile
    container_name: tutortimetracker-latex
    restart: unless-stopped
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - ./.latex-work:/latex-work

volumes:
  mariadb_data:
